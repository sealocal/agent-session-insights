<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Session Insights</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #0f0f0f;
      color: #d4d4d4;
      height: 100vh;
      display: flex;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 260px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #222;
      overflow: hidden;
    }

    #sidebar h2 {
      padding: 14px 12px 10px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: #777;
      border-bottom: 1px solid #1e1e1e;
    }

    #provider-tabs {
      display: flex;
      border-bottom: 1px solid #1e1e1e;
    }
    .provider-tab {
      flex: 1;
      padding: 10px 12px;
      text-align: center;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
      color: #888;
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      user-select: none;
    }
    .provider-tab:hover:not(:disabled) { color: #d4d4d4; }
    .provider-tab:focus-visible {
      outline: 2px solid #5a9fd4;
      outline-offset: -2px;
    }
    .provider-tab[aria-selected="true"] {
      color: #e8e8e8;
      border-bottom-color: #5a9fd4;
      background: #161616;
    }
    .provider-tab:disabled {
      color: #444;
      cursor: not-allowed;
    }

    .list-pane {
      flex: 1;
      overflow-y: auto;
    }

    .list-item {
      padding: 8px 12px;
      cursor: pointer;
      border-bottom: 1px solid #1a1a1a;
      line-height: 1.4;
    }
    .list-item:hover { background: #1a1a1a; }
    .list-item.active { background: #1e3a5f; }

    .item-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #e0e0e0;
      font-size: 12px;
    }
    .item-sub {
      color: #666;
      font-size: 11px;
      margin-top: 2px;
    }

    /* ── Main ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #header {
      padding: 12px 18px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: baseline;
      gap: 16px;
    }
    #session-heading {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    #session-title {
      font-size: 14px;
      font-weight: 600;
      color: #e8e8e8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #session-meta {
      font-size: 11px;
      color: #666;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #session-meta .session-id { color: #888; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    #session-stats { color: #666; font-size: 11px; white-space: nowrap; }

    .item-id {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      color: #777;
    }

    #chart-controls {
      display: flex;
      gap: 4px;
      justify-content: flex-end;
      padding: 10px 18px 0;
      flex-shrink: 0;
    }
    .chart-tab {
      padding: 4px 10px;
      font: inherit;
      font-size: 11px;
      color: #888;
      background: transparent;
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      cursor: pointer;
    }
    .chart-tab:hover:not([aria-pressed="true"]) { color: #d4d4d4; }
    .chart-tab[aria-pressed="true"] {
      color: #e8e8e8;
      border-color: #5a9fd4;
      background: #161616;
    }
    .chart-tab:focus-visible {
      outline: 2px solid #5a9fd4;
      outline-offset: 1px;
    }

    #chart-container {
      padding: 8px 18px 8px;
      height: 252px;
      flex-shrink: 0;
    }

    #turns-container {
      flex: 1;
      overflow-y: auto;
      padding: 0 18px 18px;
    }

    .turn-row {
      display: grid;
      grid-template-columns: 60px 80px 1fr auto;
      gap: 10px;
      align-items: baseline;
      padding: 5px 0;
      border-bottom: 1px solid #1a1a1a;
      font-size: 12px;
    }
    .turn-row.has-datapoint { cursor: crosshair; }
    .turn-row.has-datapoint:hover,
    .turn-row.chart-hovered { background: #141e2b; }
    .turn-role { color: #888; font-variant: small-caps; }
    .turn-role.assistant { color: #5a9fd4; }
    .turn-time { color: #555; font-size: 11px; font-variant-numeric: tabular-nums; }
    .turn-preview { color: #c0c0c0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .turn-tokens { color: #5a9fd4; font-variant-numeric: tabular-nums; text-align: right; font-size: 11px; white-space: nowrap; }

    #placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #444;
      font-size: 14px;
    }

    /* scrollbars */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>

<div id="sidebar">
  <div id="provider-tabs" role="tablist" aria-label="Data provider"></div>
  <h2 id="sidebar-heading">Projects</h2>
  <div class="list-pane" id="projects-list"></div>
</div>

<div id="main">
  <div id="placeholder">Select a session to view token usage</div>
  <div id="session-view" style="display:none; flex-direction:column; height:100%; overflow:hidden;">
    <div id="header">
      <div id="session-heading">
        <div id="session-title"></div>
        <div id="session-meta"></div>
      </div>
      <div id="session-stats"></div>
    </div>
    <div id="chart-controls" role="group" aria-label="Chart view"></div>
    <div id="chart-container">
      <canvas id="chart"></canvas>
    </div>
    <div id="turns-container"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
let chart = null;
let canvasMouseLeaveHandler = null;
let activeProjectEl = null;
let activeProvider = "claude";
let chartMode = "stock";
let chartSource = null;  // { turns, chartIndexToRow } for the active session

// ── API helpers ───────────────────────────────────────────────────────────────

async function api(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
  return res.json();
}

function providerPath(...parts) {
  return ["/api/providers", activeProvider, ...parts.map(encodeURIComponent)].join("/");
}

function fmt(n) {
  if (n == null) return "—";
  return n >= 1000 ? `${(n / 1000).toFixed(1)}k` : String(n);
}

function fmtTime(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function fmtDate(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleDateString([], { month: "short", day: "numeric" });
}

// ── Providers ───────────────────────────────────────────────────────────────

async function loadProviders() {
  const providers = await api("/api/providers");
  const tabs = $("provider-tabs");
  tabs.innerHTML = "";

  const firstAvailable = providers.find(p => p.available) || providers[0];
  if (firstAvailable) activeProvider = firstAvailable.id;

  const tabEls = providers.map(p => {
    const tab = document.createElement("button");
    tab.type = "button";
    tab.className = "provider-tab";
    tab.role = "tab";
    tab.id = `provider-tab-${p.id}`;
    tab.textContent = p.name;
    tab.title = p.available ? p.name : `${p.name} (data directory not found)`;
    tab.disabled = !p.available;
    tab.setAttribute("aria-selected", p.id === activeProvider ? "true" : "false");
    // Roving tabindex: only the selected tab is in the tab order; arrow keys
    // move focus between tabs without leaving the tablist.
    tab.tabIndex = p.id === activeProvider ? 0 : -1;
    tab.dataset.providerId = p.id;

    tab.addEventListener("click", () => selectProvider(p.id, tabEls));
    tabs.appendChild(tab);
    return tab;
  });

  tabs.addEventListener("keydown", e => onTabKeydown(e, tabEls));
}

function selectProvider(providerId, tabEls) {
  if (activeProvider === providerId) return;
  activeProvider = providerId;
  tabEls.forEach(el => {
    const selected = el.dataset.providerId === providerId;
    el.setAttribute("aria-selected", selected ? "true" : "false");
    el.tabIndex = selected ? 0 : -1;
  });
  resetSession();
  loadProjects();
}

function onTabKeydown(e, tabEls) {
  const enabled = tabEls.filter(el => !el.disabled);
  if (enabled.length === 0) return;
  const currentIdx = enabled.indexOf(document.activeElement);
  if (currentIdx === -1) return;

  let nextIdx;
  switch (e.key) {
    case "ArrowRight": nextIdx = (currentIdx + 1) % enabled.length; break;
    case "ArrowLeft":  nextIdx = (currentIdx - 1 + enabled.length) % enabled.length; break;
    case "Home":       nextIdx = 0; break;
    case "End":        nextIdx = enabled.length - 1; break;
    default: return;
  }
  e.preventDefault();
  const nextTab = enabled[nextIdx];
  nextTab.focus();
  selectProvider(nextTab.dataset.providerId, tabEls);
}

function resetSession() {
  $("session-view").style.display = "none";
  $("placeholder").style.display = "flex";
  activeProjectEl = null;
}

// ── Projects ───────────────────────────────────────────────────────────────

async function loadProjects() {
  $("sidebar-heading").textContent = "Projects";
  const projects = await api(providerPath("projects"));
  const list = $("projects-list");
  list.innerHTML = "";

  if (!projects.length) {
    list.innerHTML = '<div class="list-item"><div class="item-sub">No projects found</div></div>';
    return;
  }

  projects.forEach(p => {
    const el = document.createElement("div");
    el.className = "list-item";
    const name = p.display_name.split("/").filter(Boolean).pop() || p.display_name;

    const title = document.createElement("div");
    title.className = "item-title";
    title.setAttribute("title", p.display_name);
    title.textContent = name;

    const sub = document.createElement("div");
    sub.className = "item-sub";
    sub.textContent = `${p.session_count} session${p.session_count !== 1 ? "s" : ""} · ${fmtDate(p.last_active)}`;

    el.appendChild(title);
    el.appendChild(sub);
    el.addEventListener("click", () => {
      activeProjectEl?.classList.remove("active");
      el.classList.add("active");
      activeProjectEl = el;
      loadSessions(p.id, p.display_name);
    });
    list.appendChild(el);
  });
}

// ── Sessions ─────────────────────────────────────────────────────────────────

async function loadSessions(projectId, projectName) {
  $("sidebar-heading").textContent = "Sessions";
  const sessions = await api(providerPath("projects", projectId, "sessions"));

  // Replace sidebar with sessions sub-list (prepend a back button)
  const list = $("projects-list");
  list.innerHTML = "";

  const back = document.createElement("div");
  back.className = "list-item";
  const backSub = document.createElement("div");
  backSub.className = "item-sub";
  backSub.textContent = "← back";
  const backTitle = document.createElement("div");
  backTitle.className = "item-title";
  backTitle.textContent = projectName.split("/").filter(Boolean).pop() || projectName;
  back.appendChild(backSub);
  back.appendChild(backTitle);
  back.addEventListener("click", () => loadProjects());
  list.appendChild(back);

  if (!sessions.length) {
    list.innerHTML += '<div class="list-item"><div class="item-sub">No sessions</div></div>';
    return;
  }

  sessions.forEach(s => {
    const el = document.createElement("div");
    el.className = "list-item";
    const kb = (s.size_bytes / 1024).toFixed(0);
    const shortId = s.id.slice(0, 8);

    const title = document.createElement("div");
    title.className = "item-title";
    if (s.title) {
      title.textContent = s.title;
      title.setAttribute("title", `${s.title}\n${s.id}`);
    } else {
      title.textContent = shortId;
      title.setAttribute("title", s.id);
    }

    const sub = document.createElement("div");
    sub.className = "item-sub";
    if (s.title) {
      const idSpan = document.createElement("span");
      idSpan.className = "item-id";
      idSpan.textContent = shortId;
      sub.appendChild(idSpan);
      sub.appendChild(document.createTextNode(` · ${fmtDate(s.modified_at)} · ${kb} KB`));
    } else {
      sub.textContent = `${fmtDate(s.modified_at)} · ${kb} KB`;
    }

    el.appendChild(title);
    el.appendChild(sub);
    el.addEventListener("click", () => loadSession(projectId, s.id));
    list.appendChild(el);
  });
}

// ── Session detail ────────────────────────────────────────────────────────────────

async function loadSession(projectId, sessionId) {
  const session = await api(providerPath("projects", projectId, "sessions", sessionId));

  $("placeholder").style.display = "none";
  $("session-view").style.display = "flex";

  const projectName = (session.project || sessionId).split("/").filter(Boolean).pop();
  const titleEl = $("session-title");
  const metaEl = $("session-meta");
  const shortId = (session.session_id || sessionId).slice(0, 8);

  if (session.title) {
    titleEl.textContent = session.title;
    titleEl.setAttribute("title", session.title);
    metaEl.innerHTML = "";
    const idSpan = document.createElement("span");
    idSpan.className = "session-id";
    idSpan.textContent = shortId;
    metaEl.appendChild(idSpan);
    metaEl.appendChild(document.createTextNode(` · ${projectName}`));
  } else {
    titleEl.textContent = projectName;
    titleEl.removeAttribute("title");
    metaEl.innerHTML = "";
    const idSpan = document.createElement("span");
    idSpan.className = "session-id";
    idSpan.textContent = shortId;
    metaEl.appendChild(idSpan);
  }

  $("session-stats").textContent =
    `${session.turn_count} turns · peak context ${fmt(session.totals.peak_context_tokens)} tok · output ${fmt(session.totals.output_tokens)} tok`;

  const chartIndexToRow = renderTurns(session.turns);
  chartSource = {
    turns: session.turns,
    chartIndexToRow,
    compactions: session.compactions || [],
  };
  renderChart(chartSource);
}

// ── Chart ─────────────────────────────────────────────────────────────────────────────

// Draws a dashed vertical line + label at each compaction boundary. Reads its
// markers from options.plugins.compactionMarkers; positions itself between the
// last pre-compaction point and the first post-compaction point.
// roundRect is unsupported on older Safari/Firefox; fall back to an arcTo path
// so a missing method can't throw and abort the whole chart draw.
function roundRectPath(ctx, x, y, w, h, r) {
  if (typeof ctx.roundRect === "function") {
    ctx.roundRect(x, y, w, h, r);
    return;
  }
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

const compactionMarkerPlugin = {
  id: "compactionMarkers",
  afterDatasetsDraw(chart) {
    const markers = chart.options.plugins?.compactionMarkers?.markers;
    if (!markers || !markers.length) return;
    const { ctx, chartArea, scales } = chart;
    const xScale = scales.x;
    const count = chart.data.labels.length;
    if (!count) return;

    // Amber reads as a "boundary/checkpoint" event — a different category than
    // the blue/green data series — while staying within the dark theme's warmth.
    // Channels (212,159,90) mirror the blue (90,159,212) and green (106,159,90) accents.
    const lineColor = "rgba(212,159,90,0.7)";
    const labelColor = "rgba(226,179,120,0.95)";
    const pillFill = "rgba(18,18,18,0.85)";
    const pillStroke = "rgba(212,159,90,0.45)";
    const lineH = 13;
    const pillH = 14;
    const padX = 4;
    const placed = [];
    // Cap rows to what fits above the x-axis so staggered pills never spill
    // over the axis/legend (the canvas isn't clipped to chartArea).
    const maxRows = Math.max(1, Math.floor((chartArea.bottom - chartArea.top - 2) / lineH));

    ctx.save();
    ctx.font = "10px -apple-system, BlinkMacSystemFont, sans-serif";
    ctx.textBaseline = "top";
    markers.forEach(m => {
      let xPix;
      if (m.x <= 0) xPix = xScale.getPixelForValue(0);
      // compaction after the last charted point: pin to the right edge rather
      // than snapping onto the final datapoint (which would misread as a drop there)
      else if (m.x >= count) xPix = chartArea.right;
      else xPix = (xScale.getPixelForValue(m.x - 1) + xScale.getPixelForValue(m.x)) / 2;

      ctx.strokeStyle = lineColor;
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 3]);
      ctx.beginPath();
      ctx.moveTo(xPix, chartArea.top);
      ctx.lineTo(xPix, chartArea.bottom);
      ctx.stroke();
      ctx.setLineDash([]);

      // Position the label, then clamp so the whole pill stays inside the plot
      // area at both edges (right-anchored near the right, padding-aware).
      const textW = ctx.measureText(m.label).width;
      const nearRight = xPix > chartArea.right - (textW + 10);
      const minTextX = chartArea.left + padX;
      const maxTextX = chartArea.right - textW - padX;
      const textX = Math.min(Math.max(nearRight ? xPix - 3 - textW : xPix + 3, minTextX), maxTextX);
      const boxX0 = textX - padX;
      const boxX1 = textX + textW + padX;

      // Stagger labels down a row when they would horizontally overprint a
      // marker placed close by (two compactions in quick succession), but stop
      // at maxRows so a cluster can't push pills off the bottom of the chart.
      let row = 0;
      while (row < maxRows - 1 && placed.some(p => p.row === row && boxX0 < p.x1 && boxX1 > p.x0)) row++;
      placed.push({x0: boxX0, x1: boxX1, row});

      const textY = chartArea.top + 2 + row * lineH;

      // Dark backing pill so the label stays legible over data lines/gridlines.
      ctx.fillStyle = pillFill;
      ctx.strokeStyle = pillStroke;
      ctx.lineWidth = 1;
      ctx.beginPath();
      roundRectPath(ctx, boxX0, textY - 2, boxX1 - boxX0, pillH, 3);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = labelColor;
      ctx.textAlign = "left";
      ctx.fillText(m.label, textX, textY);
    });
    ctx.restore();
  },
};

// Maps a turn's full-array index to its position on the chart's x-axis, which
// only contains assistant turns that carry a context snapshot. Returns the
// number of charted points that precede the boundary.
function chartXForTurnIndex(turns, turnIndex) {
  let n = 0;
  for (let i = 0; i < turnIndex && i < turns.length; i++) {
    if (turns[i].role === "assistant" && turns[i].context_tokens != null) n++;
  }
  return n;
}

// Each mode builds its own datasets + y-scales from the assistant turns.
// "stock" keeps the original view: a per-turn context snapshot (a level) on the
// left, against an ever-growing cumulative output total on the right.
// "flow" compares two per-turn flows in the same unit, so they share one axis:
// fresh (uncached) input tokens vs output tokens generated that turn.
const CHART_MODES = {
  stock: {
    label: "Stock + running total",
    datasets(assistant) {
      let cumOutput = 0;
      return [
        {
          label: "Context tokens (snapshot)",
          data: assistant.map(t => t.context_tokens),
          borderColor: "#5a9fd4",
          backgroundColor: "rgba(90,159,212,0.08)",
          fill: true,
          tension: 0.3,
          pointRadius: 3,
          yAxisID: "yContext",
        },
        {
          label: "Cumulative output tokens",
          data: assistant.map(t => (cumOutput += t.output_tokens ?? 0)),
          borderColor: "#6a9f5a",
          backgroundColor: "transparent",
          tension: 0.3,
          pointRadius: 2,
          yAxisID: "yOutput",
        },
      ];
    },
    scales: {
      yContext: {
        type: "linear",
        position: "left",
        ticks: { color: "#5a9fd4", font: { size: 10 }, callback: v => fmt(v) },
        grid: { color: "#1a1a1a" },
      },
      yOutput: {
        type: "linear",
        position: "right",
        ticks: { color: "#6a9f5a", font: { size: 10 }, callback: v => fmt(v) },
        grid: { drawOnChartArea: false },
      },
    },
  },
  flow: {
    label: "Flow vs flow",
    datasets(assistant) {
      return [
        {
          // context snapshot minus cache reads = new tokens processed this turn,
          // which is provider-agnostic (Claude: input + cache_creation; Codex:
          // uncached portion of input_tokens).
          label: "Input tokens (fresh, per turn)",
          data: assistant.map(t => t.context_tokens - (t.cache_read_tokens ?? 0)),
          borderColor: "#5a9fd4",
          backgroundColor: "transparent",
          tension: 0.3,
          pointRadius: 3,
          yAxisID: "yTokens",
        },
        {
          label: "Output tokens (per turn)",
          data: assistant.map(t => t.output_tokens ?? 0),
          borderColor: "#6a9f5a",
          backgroundColor: "transparent",
          tension: 0.3,
          pointRadius: 3,
          yAxisID: "yTokens",
        },
      ];
    },
    scales: {
      yTokens: {
        type: "linear",
        position: "left",
        beginAtZero: true,
        ticks: { color: "#888", font: { size: 10 }, callback: v => fmt(v) },
        grid: { color: "#1a1a1a" },
      },
    },
  },
};

function initChartControls() {
  const bar = $("chart-controls");
  bar.innerHTML = "";
  Object.entries(CHART_MODES).forEach(([id, mode]) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "chart-tab";
    btn.textContent = mode.label;
    btn.dataset.mode = id;
    btn.setAttribute("aria-pressed", id === chartMode ? "true" : "false");
    btn.addEventListener("click", () => setChartMode(id));
    bar.appendChild(btn);
  });
}

function setChartMode(mode) {
  if (chartMode === mode || !CHART_MODES[mode]) return;
  chartMode = mode;
  $("chart-controls").querySelectorAll(".chart-tab").forEach(el =>
    el.setAttribute("aria-pressed", el.dataset.mode === mode ? "true" : "false")
  );
  if (chartSource) renderChart(chartSource);
}

function renderChart({ turns, chartIndexToRow, compactions }) {
  const assistant = turns.filter(t => t.role === "assistant" && t.context_tokens != null);
  const labels = assistant.map(t => fmtTime(t.timestamp));
  const mode = CHART_MODES[chartMode];
  const markers = (compactions || []).map(c => ({
    x: chartXForTurnIndex(turns, c.turn_index),
    label: `⤵ compact ${fmt(c.pre_tokens)}→${fmt(c.post_tokens)}`,
  }));

  const canvas = $("chart");
  if (chart) chart.destroy();
  if (canvasMouseLeaveHandler) {
    canvas.removeEventListener("mouseleave", canvasMouseLeaveHandler);
  }
  let lastChartHoverIdx = null;
  const clearChartHover = () => {
    if (lastChartHoverIdx == null) return;
    chartIndexToRow[lastChartHoverIdx]?.classList.remove("chart-hovered");
    lastChartHoverIdx = null;
  };

  chart = new Chart(canvas, {
    type: "line",
    plugins: [compactionMarkerPlugin],
    data: {
      labels,
      datasets: mode.datasets(assistant),
    },
    options: {
      animation: false,
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: "index", intersect: false },
      onHover: (_event, activeElements) => {
        const ci = activeElements.length ? activeElements[0].index : null;
        if (ci === lastChartHoverIdx) return;
        clearChartHover();
        if (ci != null) {
          const row = chartIndexToRow[ci];
          if (row) {
            row.classList.add("chart-hovered");
            row.scrollIntoView({ block: "nearest" });
            lastChartHoverIdx = ci;
          }
        }
      },
      plugins: {
        legend: { labels: { color: "#888", font: { size: 11 } } },
        tooltip: {
          backgroundColor: "#1a1a1a",
          titleColor: "#aaa",
          bodyColor: "#ddd",
          callbacks: {
            label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toLocaleString()}`,
          },
        },
        compactionMarkers: { markers },
      },
      scales: {
        x: { ticks: { color: "#555", font: { size: 10 } }, grid: { color: "#1a1a1a" } },
        ...mode.scales,
      },
    },
  });

  canvasMouseLeaveHandler = clearChartHover;
  canvas.addEventListener("mouseleave", canvasMouseLeaveHandler);
}

// ── Turns list ───────────────────────────────────────────────────────────────────

function renderTurns(turns) {
  const container = $("turns-container");
  container.innerHTML = "";

  // Build a parallel array mapping each turn to its chart data point index.
  // The chart only includes assistant turns that have context_tokens.
  let chartIdx = 0;
  const turnToChartIndex = turns.map(t =>
    (t.role === "assistant" && t.context_tokens != null) ? chartIdx++ : null
  );
  const chartIndexToRow = [];

  turns.forEach((t, i) => {
    const row = document.createElement("div");
    row.className = "turn-row";

    const roleEl = document.createElement("div");
    roleEl.className = `turn-role ${t.role}`;  // t.role is "user"|"assistant" from server
    roleEl.textContent = t.role;

    const timeEl = document.createElement("div");
    timeEl.className = "turn-time";
    timeEl.textContent = fmtTime(t.timestamp);

    const previewEl = document.createElement("div");
    previewEl.className = "turn-preview";
    previewEl.textContent = t.text_preview ?? "";

    const tokensEl = document.createElement("div");
    tokensEl.className = "turn-tokens";
    tokensEl.textContent = t.context_tokens != null ? fmt(t.context_tokens) + " ctx" : "";

    const ci = turnToChartIndex[i];
    if (ci != null) {
      chartIndexToRow[ci] = row;
      row.classList.add("has-datapoint");
      row.addEventListener("mouseenter", () => {
        const active = chart.data.datasets.map((_, di) => ({ datasetIndex: di, index: ci }));
        const pos = chart.getDatasetMeta(0).data[ci].getCenterPoint();
        chart.setActiveElements(active);
        chart.tooltip.setActiveElements(active, pos);
        chart.update();
      });
      row.addEventListener("mouseleave", () => {
        chart.setActiveElements([]);
        chart.tooltip.setActiveElements([], { x: 0, y: 0 });
        chart.update();
      });
    }

    row.appendChild(roleEl);
    row.appendChild(timeEl);
    row.appendChild(previewEl);
    row.appendChild(tokensEl);
    container.appendChild(row);
  });

  return chartIndexToRow;
}

// ── Boot ──────────────────────────────────────────────────────────────────────────────

(async () => {
  try {
    initChartControls();
    await loadProviders();
    await loadProjects();
  } catch (e) {
    console.error("Failed to load:", e);
  }
})();
</script>
